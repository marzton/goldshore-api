name = "goldshore-gateway"
main = "src/index.ts"
compatibility_date = "2025-01-15"

routes = [
  { pattern = "gateway.goldshore.org/*", zone_name = "goldshore.org" }
]

kv_namespaces = [
  { binding = "RATE_LIMIT", id = "00000000000000000000000000000000" }
]

r2_buckets = [
  { binding = "R2_LOGS", bucket_name = "goldshore-logs" }
]
