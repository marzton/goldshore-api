name = "goldshore-api"
main = "src/index.ts"
compatibility_date = "2025-01-20"

account_id = "f77de112d2019e5456a3198a8bb50bd2"

routes = [
  { pattern = "api.goldshore.org/*", zone_id = "d86cd71f0d1c8b8e08928a32e0c95ae3" }
]

[vars]
# Non-secret environment variables.
# Secrets are managed via `wrangler secret put` and are not committed to the repository.

# Routing
PUBLIC_HOME = "https://goldshore.org"
ADMIN_APP = "https://admin.goldshore.org"
API_BASE = "https://api.goldshore.org"

# Security / integrations
CORS_ALLOWED = "[\"https://goldshore.org\",\"https://admin.goldshore.org\",\"https://preview.goldshore.org\",\"http://localhost:5173\"]"

[[kv_namespaces]]
binding = "KV_SESSIONS"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "KV_CACHE"
id = "00000000000000000000000000000001"

[[kv_namespaces]]
binding = "KV_NAMESPACE"
id = "goldshore.org"

[[r2_buckets]]
binding = "R2_PUBLIC"
bucket_name = "goldshore-public"

[[r2_buckets]]
binding = "R2_LOGS"
bucket_name = "goldshore-logs"

[[d1_databases]]
binding = "D1_DATABASE"
database_name = "goldshore-core"
database_id = "00000000-0000-0000-0000-000000000000"

[queues]
producers = [
  { queue = "events", binding = "QUEUE_EVENTS" },
  { queue = "dlq", binding = "QUEUE_DLQ" }
]
consumers = [
  { queue = "events", dead_letter_queue = "dlq" }
]

[triggers]
crons = ["*/30 * * * *"]
