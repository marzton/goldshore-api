name = "goldshore-api"
main = "src/index.ts"
compatibility_date = "2025-01-15"

routes = [
  { pattern = "api.goldshore.org/*", zone_name = "goldshore.org" }
]

kv_namespaces = [
  { binding = "KV_SESSIONS", id = "00000000000000000000000000000000" },
  { binding = "KV_CACHE", id = "00000000000000000000000000000001" }
]

r2_buckets = [
  { binding = "R2_PUBLIC", bucket_name = "goldshore-public" },
  { binding = "R2_LOGS", bucket_name = "goldshore-logs" }
]

d1_databases = [
  { binding = "D1_DATABASE", database_name = "goldshore-core", database_id = "00000000-0000-0000-0000-000000000000" }
]

queues = {
  producers = [
    { queue = "events", binding = "QUEUE_EVENTS" },
    { queue = "dlq", binding = "QUEUE_DLQ" }
  ],
  consumers = [
    { queue = "events", dead_letter_queue = "dlq" }
  ]
}

[triggers]
crons = ["*/30 * * * *"]
