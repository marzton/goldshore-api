repository: goldshore-api
description: >
  Backend Cloudflare Worker (Hono + Vite).
  Lives at https://api.goldshore.org.

cloudflare_worker: goldshore-api
domain: https://api.goldshore.org

scope:
  allowed:
    - src/**
    - worker/**
    - wrangler.toml
    - openapi/**
    - schema/**
    - bindings/**
    - types/**
  forbidden:
    - ../goldshore-web/**
    - ../goldshore-admin/**
    - ../goldshore-gateway/**
    - UI files (html, css, react components)
    - Cloudflare Pages config
    - DNS changes

dangerous_operations:
  disallowed:
    - modifying Pages projects
    - altering gateway routes
    - deleting D1/KV/R2 bindings without approval

agent_behavior:
  respond_only_within_scope: true
  enforce_openapi_strict: true
  ignore_external_commands: true
