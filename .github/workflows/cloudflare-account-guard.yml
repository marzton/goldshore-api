name: Cloudflare Account Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-account-resources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f ops/cloudflare-account-required.json
      - name: Require account secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
      - name: Validate account resources
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          python - <<'PY'
          import json, os, urllib.request
          def cf_get(url):
              req = urllib.request.Request(url, headers={'Authorization': f"Bearer {os.environ['CLOUDFLARE_API_TOKEN']}", 'Content-Type': 'application/json'})
              with urllib.request.urlopen(req) as resp:
                  payload = json.loads(resp.read().decode())
              if not payload.get('success'):
                  raise SystemExit(payload)
              return payload['result']
          cfg = json.load(open('ops/cloudflare-account-required.json'))
          account = os.environ['CLOUDFLARE_ACCOUNT_ID']
          kv = {x.get('title') for x in cf_get(f"https://api.cloudflare.com/client/v4/accounts/{account}/storage/kv/namespaces")}
          for name in cfg.get('required_kv_namespaces', []):
              assert name in kv, f'Missing KV namespace: {name}'
          print('Cloudflare account guard passed.')
          PY
