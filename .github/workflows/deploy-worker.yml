name: Deploy API (Worker GoldShore)
on:
  push:
    branches: [ main ]
    paths:
      - "apps/api-worker/**"
      - ".github/workflows/deploy-worker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      ENV: ${{ secrets.ENV }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ALPACA_PAPER_API_KEY_ID: ${{ secrets.ALPACA_PAPER_API_KEY_ID }}
      ALPACA_PAPER_API_SECRET_KEY: ${{ secrets.ALPACA_PAPER_API_SECRET_KEY }}
      ALPACA_PAPER_BASE_URL: "https://paper-api.alpaca.markets"
      ALPACA_LIVE_API_KEY_ID: ${{ secrets.ALPACA_LIVE_API_KEY_ID }}
      ALPACA_LIVE_API_SECRET_KEY: ${{ secrets.ALPACA_LIVE_API_SECRET_KEY }}
      ALPACA_LIVE_BASE_URL: "https://api.alpaca.markets"
      TRADING_ENABLED: ${{ secrets.TRADING_ENABLED }}
      ORDER_MAX_NOTIONAL: ${{ secrets.ORDER_MAX_NOTIONAL }}
      ORDER_ALLOWED_SYMBOLS: ${{ secrets.ORDER_ALLOWED_SYMBOLS }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: corepack enable
      - name: Install worker dependencies
        working-directory: apps/api-worker
        run: pnpm install --frozen-lockfile=false
      - run: npm i -g wrangler
      - name: Sync Worker secrets
        working-directory: apps/api-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          sync_secret() {
            local key="$1"
            local value="$2"
            if [ -n "$value" ]; then
              wrangler secret put "$key" --text "$value"
            fi
          }

          sync_secret ENV "${ENV:-staging}"
          sync_secret OPENAI_API_KEY "${OPENAI_API_KEY-}"
          sync_secret ALPACA_PAPER_API_KEY_ID "${ALPACA_PAPER_API_KEY_ID-}"
          sync_secret ALPACA_PAPER_API_SECRET_KEY "${ALPACA_PAPER_API_SECRET_KEY-}"
          sync_secret ALPACA_PAPER_BASE_URL "${ALPACA_PAPER_BASE_URL-}"
          sync_secret ALPACA_LIVE_API_KEY_ID "${ALPACA_LIVE_API_KEY_ID-}"
          sync_secret ALPACA_LIVE_API_SECRET_KEY "${ALPACA_LIVE_API_SECRET_KEY-}"
          sync_secret ALPACA_LIVE_BASE_URL "${ALPACA_LIVE_BASE_URL-}"
          sync_secret TRADING_ENABLED "${TRADING_ENABLED:-false}"
          sync_secret ORDER_MAX_NOTIONAL "${ORDER_MAX_NOTIONAL-}"
          sync_secret ORDER_ALLOWED_SYMBOLS "${ORDER_ALLOWED_SYMBOLS-}"
      - name: Deploy Worker
        working-directory: apps/api-worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
