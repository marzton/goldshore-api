name: Deploy API (Worker goldshore-api)
on:
  push:
    branches: [ main ]
    paths:
      - "apps/api-worker/**"
      - ".github/workflows/deploy-worker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & PNPM
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable corepack / install pnpm
        run: corepack enable

      # 👉 Install this package’s dependencies before bundling
      - name: Install Worker dependencies
        working-directory: apps/api-worker
        run: pnpm install --frozen-lockfile=false
      - run: npm i -g wrangler
      - name: Configure trade webhook token
        working-directory: apps/api-worker
        env:
          <<: &cloudflare-credentials
            CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
            CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TRADE_WEBHOOK_TOKEN: ${{ secrets.TRADE_WEBHOOK_TOKEN }}
        run: |
          if [ -z "${TRADE_WEBHOOK_TOKEN}" ]; then
            echo "TRADE_WEBHOOK_TOKEN secret is not configured" >&2
            exit 1
          fi
          echo "${TRADE_WEBHOOK_TOKEN}" | wrangler secret put TRADE_WEBHOOK_TOKEN
      - name: Configure Worker secrets
        working-directory: apps/api-worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          TRADE_WEBHOOK_TOKEN: ${{ secrets.TRADE_WEBHOOK_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${ALPACA_KEY:-}" ]; then
            echo "Missing ALPACA_KEY secret" >&2
            exit 1
          fi
          if [ -z "${ALPACA_SECRET:-}" ]; then
            echo "Missing ALPACA_SECRET secret" >&2
            exit 1
          fi
          if [ -z "${TRADE_WEBHOOK_TOKEN:-}" ]; then
            echo "Missing TRADE_WEBHOOK_TOKEN secret" >&2
            exit 1
          fi
          wrangler secret put ALPACA_KEY --text "${ALPACA_KEY}"
          wrangler secret put ALPACA_SECRET --text "${ALPACA_SECRET}"
          wrangler secret put TRADE_WEBHOOK_TOKEN --text "${TRADE_WEBHOOK_TOKEN}"
      - name: Deploy Worker
        working-directory: apps/api-worker
        run: wrangler deploy
        env:
          <<: *cloudflare-credentials
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
