name: Deploy API (Worker goldshore-api)
on:
  push:
    branches: [ main ]
    paths:
      - "apps/api-worker/**"
      - ".github/workflows/deploy-worker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node & PNPM
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable corepack / install pnpm
        run: corepack enable

      # 👉 Install this package’s dependencies before bundling
      - name: Install Worker dependencies
        working-directory: apps/api-worker
        run: pnpm install --frozen-lockfile

      # Wrangler expects those deps in node_modules when bundling
      - name: Install Wrangler CLI
        run: pnpm add -g wrangler

      - name: Deploy Worker
        working-directory: apps/api-worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
