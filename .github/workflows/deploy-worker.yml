name: Deploy API (Worker goldshore-api)
on:
  push:
    branches: [ main ]
    paths:
      - "apps/api-worker/**"
      - ".github/workflows/deploy-worker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: goldshore-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: pnpm/action-setup@v4
        with:
          version: 9.6.0
      - name: Install dependencies
        run: pnpm install --filter ./apps/api-worker --prod
      - run: npm i -g wrangler
      - run: corepack enable
      - name: Install dependencies
        run: pnpm install --filter @goldshore/api-worker... --prod --no-frozen-lockfile
      - name: Deploy Worker
        working-directory: apps/api-worker
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_GOLDSHORE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALPACA_KEY: ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
