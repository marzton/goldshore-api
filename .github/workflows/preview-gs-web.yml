name: Preview GS Web (Pages)

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/preview-gs-web.yml'
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Deploy PR preview to Cloudflare Pages (gs-web)
        if: github.event_name == 'pull_request'
        run: npx wrangler@4.42.2 pages deploy dist --project-name=gs-web --branch=pr-${{ github.event.pull_request.number }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy manual preview to Cloudflare Pages (gs-web)
        if: github.event_name == 'workflow_dispatch'
        run: npx wrangler@4.42.2 pages deploy dist --project-name=gs-web --branch=preview-manual
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
