<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Access Restricted · Gold Shore Labs</title>
    <style>
      :root {
        color-scheme: dark;
        --goldshore-blue: #1b6eff;
        --goldshore-background: #000000;
        --goldshore-foreground: #ffffff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--goldshore-background);
        color: var(--goldshore-foreground);
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      main {
        max-width: 480px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 3rem 2rem;
        border-radius: 24px;
        background: rgba(10, 10, 10, 0.75);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.65);
      }
      img {
        width: 96px;
        height: 96px;
        margin-bottom: 1.5rem;
      }
      h1 {
        font-size: 1.85rem;
        margin-bottom: 1rem;
        letter-spacing: 0.01em;
      }
      p {
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.6;
        margin: 0 0 2rem;
      }
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: var(--goldshore-blue);
        color: #fff;
        font-weight: 600;
        padding: 0.85rem 1.75rem;
        border-radius: 999px;
        text-decoration: none;
        transition: transform 150ms ease, box-shadow 150ms ease;
        box-shadow: 0 10px 30px rgba(27, 110, 255, 0.35);
      }
      a.button:hover {
        transform: translateY(-2px);
        box-shadow: 0 18px 40px rgba(27, 110, 255, 0.4);
      }
      footer {
        margin-top: 2rem;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="https://goldshore-web.pages.dev/images/penrose_logo.svg" alt="Gold Shore Labs" />
      <h1>Access Restricted</h1>
      <p>
        Gold Shore Labs resources are protected by Cloudflare Access. Sign in with your Gold Shore Labs identity to
        continue. If you expected entry and were denied, contact the Infra team.
      </p>
      <a class="button" href="https://goldshore.cloudflareaccess.com">Return to Gold Shore Access</a>
      <footer>Request ID: <span id="request-id">loading…</span></footer>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const requestId = params.get("request_id") || params.get("cf_request_id");
        if (requestId) {
          document.getElementById("request-id").textContent = requestId;
        } else {
          document.getElementById("request-id").textContent = "unavailable";
        }
      })();
    </script>
  </body>
</html>
