name = "goldshore-agent"
main = "src/index.ts"
compatibility_date = "2025-01-15"
workers_dev = true

routes = [
  { pattern = "api.goldshore.org/*", zone_name = "goldshore.org" },
  { pattern = "api.banproof.me/*", zone_name = "banproof.me" }
]

[[kv_namespaces]]
binding = "SYSTEM_LOGS"
id = "00000000000000000000000000000000"

[[kv_namespaces]]
binding = "APPLIED_JOBS"
id = "00000000000000000000000000000001"

[[kv_namespaces]]
binding = "AGENT_STATE"
id = "00000000000000000000000000000002"

[vars]
CORS_ORIGINS = "https://goldshore.org,https://www.goldshore.org,https://web.goldshore.org,https://*.goldshore.org,https://*.goldshore-web.pages.dev"
ACCESS_ISSUER = "https://goldshore.cloudflareaccess.com"
ACCESS_JWKS_URL = "https://goldshore.cloudflareaccess.com/cdn-cgi/access/certs"
ACCESS_AUDIENCE = "15b3d02e775a7c84ac87a41d671bff94da19cb968c3a07c72b087d0e2ccafaf5"
AGENT_SYSTEM_PROMPT = ""
SERVICE_NAME = "GoldShore Agent"
AI_MODEL = "gpt-4o-mini"
PUBLIC_ADMIN = "https://admin.goldshore.org"
